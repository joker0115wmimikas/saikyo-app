      '男': [ [37,30,22,14], [44,37,28,19], [51,43,33,23], [58,48,38,27], [65,54,43,31], [71,60,48,35] ],

      grip: { id: 'grip', name: '握力', unit: 'kg', step: 0.1, max: 50, min: 0, better: 'high', icon: '✊' },
      situp: { id: 'situp', name: '上体起こし', unit: '回', step: 1, max: 50, min: 0, better: 'high', icon: '🧎‍♀️' },
      sitreach: { id: 'sitreach', name: '長座体前屈', unit: 'cm', step: 1, max: 80, min: 0, better: 'high', icon: '🧘‍♀️' },
      sidestep: { id: 'sidestep', name: '反復横とび', unit: '回', step: 1, max: 80, min: 0, better: 'high', icon: '↔️' },
      shuttle: { id: 'shuttle', name: '20mシャトル', unit: '回', step: 1, max: 120, min: 0, better: 'high', icon: '🏃‍♀️' },

    };

    const GRADE_STATS = {
      1: { mean: 25, sd: 8 }, 2: { mean: 32, sd: 8 }, 3: { mean: 40, sd: 8 },
      4: { mean: 48, sd: 9 }, 5: { mean: 55, sd: 9 }, 6: { mean: 60, sd: 9 }
    };

    const calcScore = (val, gender, grade, eventId) => {
      if (val === undefined || val === '') return 0;
      const gradeIdx = Math.max(0, Math.min(5, grade - 1));
      const thresholds = SCORE_THRESHOLDS[gender]?.[eventId]?.[gradeIdx];
      if (!thresholds) return 1;

      if (EVENT_MASTERS[eventId].better === 'low') {
        for (let i = 0; i < 9; i++) if (val <= thresholds[i]) return 10 - i;
      } else {
        for (let i = 0; i < 9; i++) if (val >= thresholds[i]) return 10 - i;
      }
      return 1;
    };

    const getComprehensiveGrade = (totalScore, gender, grade) => {
      if (totalScore === 0) return '-';
      const gradeIdx = Math.max(0, Math.min(5, grade - 1));
      const borders = GRADE_THRESHOLDS[gender][gradeIdx];
      if (totalScore >= borders[0]) return 'A';
      if (totalScore >= borders[1]) return 'B';
      if (totalScore >= borders[2]) return 'C';
      if (totalScore >= borders[3]) return 'D';
      return 'E';
    };

    const getTitleInfo = (totalScore, grade) => {
      if (totalScore === 0) return { name: '計測せよ', color: 'bg-gray-400 text-white', iconName: 'star', hell: 'ゴミ' };
      const stats = GRADE_STATS[Math.max(1, Math.min(6, grade))];
      const dev = Math.round(((totalScore - stats.mean) / stats.sd) * 10 + 50);

      if (dev >= 70) return { name: 'もはや鬼', color: 'bg-gradient-to-r from-purple-600 to-indigo-800 text-white shadow-purple-500/50', iconName: 'skull', hell: '上出来だ。だがまだ鬼舞辻様には遠く及ばぬ。' };

      if (dev >= 60) return { name: 'ゲキツヨ', color: 'bg-red-500 text-white', iconName: 'flame', hell: 'こんな数字で満足しているのか？腕立て1000回追加だ！' }; 
      if (dev >= 56) return { name: 'ツヨメ', color: 'bg-orange-500 text-white', iconName: 'zap', hell: '中途半端な奴が一番嫌いなんだ。死ぬ気で走れ！' }; 
      if (dev >= 52) return { name: '努力賞', color: 'bg-blue-500 text-white', iconName: 'award', hell: '努力だけじゃ人は救えん！結果を出せ、結果を！' }; 
      if (dev >= 47) return { name: 'マーマー', color: 'bg-green-500 text-white', iconName: 'activity', hell: '判断が遅い！そんな緩みきった肉体でどうする！' }; 
      return { name: '鱗瀧先生激怒', color: 'bg-gray-800 text-red-500 font-serif border-2 border-red-800', iconName: 'shield-alert', hell: '貴様には才能がない！今すぐ山を降りろ！！！' }; 
    };

    const getComprehensiveGradeStyle = (gradeChar) => {
      switch (gradeChar) {
        case 'A': return 'text-transparent bg-clip-text bg-gradient-to-br from-yellow-400 to-orange-600';
        case 'B': return 'text-blue-500';
        case 'C': return 'text-green-500';

      switch (gradeChar) {
        case 'A': return 'bg-gradient-to-r from-yellow-300 via-yellow-500 to-yellow-600 text-white shadow-yellow-500/50';
        case 'B': return 'bg-blue-500 text-white';
        case 'C': return 'bg-green-500 text-white';
        case 'D': return 'bg-orange-400 text-white';
        default: return 'bg-gray-400 text-white';

    // --- Main App Component ---
    function App() {
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState('');
      const [childrenData, setChildrenData] = useState([]);
      const [records, setRecords] = useState([]);
      
      const [currentChildId, setCurrentChildId] = useState(null);
      const [currentTab, setCurrentTab] = useState('home');
      const [isHellMode, setIsHellMode] = useState(false);
      const [rivalId, setRivalId] = useState('');

      const [editingRecordId, setEditingRecordId] = useState(null);
      const [inputData, setInputData] = useState({});
      const [inputDate, setInputDate] = useState('');
      const [inputGrade, setInputGrade] = useState(1);
      const [inputComment, setInputComment] = useState('');

      const [aiReview, setAiReview] = useState('');
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [showAiModal, setShowAiModal] = useState(false);

      // Auth
      useEffect(() => {
        let isMounted = true;
        
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
          .catch(() => auth.setPersistence(firebase.auth.Auth.Persistence.NONE))
          .then(() => {
            const unsubscribe = auth.onAuthStateChanged(currentUser => {
              if (!isMounted) return;
              if (currentUser) {
                setUser(currentUser);
                setAuthError('');
              } else {
                auth.signInAnonymously().catch(e => {
                  console.error("Auth Error:", e);
                  if (e.code === 'auth/configuration-not-found') {
                    setAuthError('Firebaseコンソールで「匿名ログイン」が有効になっていません。「Authentication」→「Sign-in method」から「匿名」をオンにしてください。');
                  } else {
                    setAuthError(`ログイン失敗: ${e.message}`);
                  }
                });
              }
            });
            return () => { isMounted = false; unsubscribe && unsubscribe(); };
          });
      }, []);

      // Data Fetching
      useEffect(() => {
        if (!user) return;
        
        const childrenRef = db.collection('users').doc(user.uid).collection('children');
        const recordsRef = db.collection('users').doc(user.uid).collection('records');

        const unsubChildren = childrenRef.onSnapshot(snap => {
          const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setChildrenData(data);
          if (data.length > 0 && !currentChildId) setCurrentChildId(data[0].id);
        }, err => {
          console.error("Fetch error:", err);
          setAuthError('Firestore読込エラー（ルールの設定を確認してください）');
        });

        const unsubRecords = recordsRef.onSnapshot(snap => {
          setRecords(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, err => console.error(err));

        return () => { unsubChildren(); unsubRecords(); };
      }, [user, currentChildId]);

      const currentChild = childrenData.find(c => c.id === currentChildId);
      const rivalChild = childrenData.find(c => c.id === rivalId);
      
      const analyzeRecord = (record, child) => {
        if (!record || !child) return null;
        let totalScore = 0;
        const details = [];
        Object.keys(EVENT_MASTERS).forEach(eventId => {
          const val = record.data[eventId];
          const score = calcScore(val, child.gender, record.grade, eventId);
          totalScore += score;
          details.push({ ...EVENT_MASTERS[eventId], val, score });
        });
        const compGrade = getComprehensiveGrade(totalScore, child.gender, record.grade);
        const titleInfo = getTitleInfo(totalScore, record.grade);
        return { ...record, totalScore, details, compGrade, titleInfo };
      };

      const userRecords = useMemo(() => {
        return records
          .filter(r => r.childId === currentChildId)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
      }, [records, currentChildId]);

      const latestAnalyzed = analyzeRecord(userRecords[0], currentChild);
      const rivalRecords = useMemo(() => records.filter(r => r.childId === rivalId).sort((a, b) => new Date(b.date) - new Date(a.date)), [records, rivalId]);
      const rivalLatestAnalyzed = analyzeRecord(rivalRecords[0], rivalChild);


      // Actions
      const handleSaveRecord = async () => {
        if (!user) return alert("Firebaseの設定が完了していません。\n画面上の赤いエラーメッセージを確認してください。");
        if (!currentChildId) return alert("選手を選択してください。");
        
        const recordId = editingRecordId || Date.now().toString();
        const newRecord = {
          id: recordId,
          childId: currentChildId,
          date: inputDate,
          grade: parseInt(inputGrade),
          data: { ...inputData },
          comment: inputComment
        };
        
        try {
          await db.collection('users').doc(user.uid).collection('records').doc(recordId).set(newRecord);
          setCurrentTab('history');
        } catch (e) { 
          console.error(e); 
          alert(`保存エラー: ${e.message}\nFirestoreのルール設定を確認してください。`); 
        }
      };

      const handleDeleteRecord = async () => {
        if (!user || !editingRecordId) return;
        if (window.confirm('本当にこの記録を削除しますか？')) {
          try {
            await db.collection('users').doc(user.uid).collection('records').doc(editingRecordId).delete();
            setCurrentTab('history');
          } catch (e) { console.error(e); alert('削除に失敗しました'); }
        }
      };

      const handleAddChild = async (e) => {
        e.preventDefault();
        
        if (!user) {
          alert("Firebaseの設定が完了していません。\n画面上の赤いエラーメッセージを確認し、設定を行ってください。");
          return;
        }

        const fd = new FormData(e.target);
        const name = fd.get('name');
        if(!name) return;
        
        const newId = Date.now().toString();
        const newChild = { 
          id: newId, name, 
          defaultGrade: parseInt(fd.get('grade')), 
          gender: fd.get('gender'), avatar: fd.get('avatar') 
        };
        
        try {
          await db.collection('users').doc(user.uid).collection('children').doc(newId).set(newChild);
          setCurrentChildId(newId);
          setCurrentTab('home');
          e.target.reset();
        } catch (e) { 
          console.error(e); 
          alert(`登録エラー: ${e.message}\nFirestoreのルールが「テストモード」から変更されているか確認してください。`); 
        }
      };

      const startEditing = (recordToEdit = null) => {
        if (recordToEdit) {
          setEditingRecordId(recordToEdit.id);
          setInputData({ ...recordToEdit.data });
          setInputDate(recordToEdit.date);
          setInputGrade(recordToEdit.grade);
          setInputComment(recordToEdit.comment || '');
        } else {
          setEditingRecordId(null);
          setInputData({});
          setInputDate(new Date().toISOString().split('T')[0]);
          setInputGrade(currentChild?.defaultGrade || 1);
          setInputComment('');
        }
        setCurrentTab('input');
      };

      // AI Review
      const fetchAiReview = async () => {
        if(!latestAnalyzed || !currentChild) return;
        setShowAiModal(true);
        setIsAiLoading(true);
        setAiReview('');
        
        const geminiApiKey = "AIzaSyAlC5tsCQqqD9f9StAgGmijjk0QjPvz2os"; 
        
        let prompt = `
          選手: ${currentChild.name} (${latestAnalyzed.grade}年生 ${currentChild.gender})
          記録: 総合 ${latestAnalyzed.compGrade}判定 / 合計 ${latestAnalyzed.totalScore}点
          称号: ${latestAnalyzed.titleInfo.name}
        `;

        if (rivalLatestAnalyzed) {
          prompt += `\nライバル情報: ${rivalChild.name} (合計 ${rivalLatestAnalyzed.totalScore}点)`;
        }

        if (isHellMode) {
          prompt += `\n【超重要指示】あなたは「地獄の特訓コーチ（鱗瀧先生風）」です。口調はパワハラ寸前の超絶スパルタ、軍隊のように厳しくしてください。「もはや鬼」「最強小学生」の称号でなければ、全てゴミ扱いして激怒してください。「判断が遅い！」「腕立て伏せ1000回だ！」などのワードを使い、甘えを一切許さないでください。150文字以内で。`;
        } else {
          prompt += `\n【指示】あなたは子供向けの熱血スポーツコーチです。褒めて伸ばすスタイルで、元気いっぱいにアドバイスしてください。「〜だぜ！」「最高だ！」のような口調で150文字以内で！`;
        }

        try {
          // モデルを安定版の `gemini-2.5-flash` に変更
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          
          const data = await res.json();
          
          // エラー詳細を取得するためのハンドリング
          if (!res.ok) {

                  </div>
                  <h3 className={`text-xl font-extrabold mb-2 ${isHellMode ? 'text-red-600 font-serif' : ''}`}>{isHellMode ? '地獄の説教部屋' : '熱血コーチ'}</h3>
                  
                  <div className={`w-full rounded-2xl p-5 mt-2 border min-h-[120px] flex items-center justify-center relative ${isHellMode ? 'bg-red-950/30 border-red-900' : 'bg-gray-50 border-gray-100'}`}>
                    {isAiLoading ? (
                      <div className="flex flex-col items-center font-bold animate-pulse"><Icon name="zap" size={24} className="mb-2" />{isHellMode ? '分析中だ...' : '分析中だぜ...！！'}</div>
                    ) : (
                      <p className={`font-medium leading-relaxed text-left whitespace-pre-wrap ${isHellMode ? 'font-serif text-lg tracking-widest' : ''}`}>{aiReview}</p>
                    )}
                  </div>
                  <button onClick={() => setShowAiModal(false)} className={`mt-6 font-bold py-3 px-8 rounded-full shadow-md w-full ${isHellMode ? 'bg-red-800 text-black' : 'bg-gray-800 text-white'}`}>
                    {isHellMode ? 'は、はいぃぃっ！！' : 'よし、がんばるぞ！'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

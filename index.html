        sitreach: [ [42,38,34,30,25,20,16,12,8], [45,41,36,32,27,22,18,14,10], [47,43,38,34,29,24,20,15,11], [49,44,40,36,31,26,21,16,12], [50,45,41,37,32,27,22,17,13], [51,46,42,38,32,27,23,19,15] ],
        sidestep: [ [34,31,28,25,21,18,15,12,9], [37,34,31,27,24,20,17,14,11], [40,37,34,30,26,22,19,16,13], [43,40,37,33,29,25,22,18,15], [46,43,40,36,32,28,24,20,16], [49,46,43,39,34,30,26,21,17] ],
        shuttle: [ [37,29,22,16,11,8,6,4,2], [45,36,28,21,15,11,8,5,3], [53,44,34,26,19,14,10,7,4], [59,49,39,31,23,17,12,8,5], [62,52,43,34,25,18,13,9,6], [63,53,44,35,25,18,14,11,8] ],
        dash50: [ [9.6,10.0,10.4,10.9,11.5,12.1,12.7,13.3,13.9], [9.3,9.7,10.1,10.5,11.1,11.7,12.3,12.9,13.5], [8.9,9.3,9.7,10.1,10.6,11.2,11.8,12.4,13.0], [8.6,8.9,9.3,9.7,10.2,10.7,11.3,11.9,12.5], [8.4,8.7,9.0,9.4,9.9,10.4,11.0,11.6,12.2], [8.2,8.5,8.8,9.2,9.7,10.2,10.8,11.4,12.0] ],
        jump: [ [140,131,121,111,99,87,76,65,54], [148,139,129,118,106,94,82,71,60], [156,147,136,125,113,101,89,77,66], [162,153,142,131,119,107,95,83,72], [168,159,148,137,125,113,102,90,79], [172,163,153,144,131,120,110,99,88] ],
        throw: [ [13,11,9,7,6,4,3,2,1], [16,13,11,9,7,5,4,3,2], [19,16,13,11,8,6,5,4,3], [22,18,15,13,10,8,6,4,3], [24,20,17,14,11,8,6,5,3], [25,21,18,15,12,9,7,5,4] ]
      }
    };

    const GRADE_THRESHOLDS = {
      '男': [ [37,30,22,14], [44,37,28,19], [51,43,33,23], [58,48,38,27], [65,54,43,31], [71,60,48,35] ],
      '女': [ [39,32,24,16], [45,38,30,21], [53,45,36,26], [60,51,41,30], [65,56,46,34], [71,60,49,38] ]
    };

    const EVENT_MASTERS = {
      grip: { id: 'grip', name: '握力', unit: 'kg', step: 0.1, max: 50, min: 0, better: 'high', icon: '✊' },
      situp: { id: 'situp', name: '上体起こし', unit: '回', step: 1, max: 50, min: 0, better: 'high', icon: '🧎‍♀️' },
      sitreach: { id: 'sitreach', name: '長座体前屈', unit: 'cm', step: 1, max: 80, min: 0, better: 'high', icon: '🧘‍♀️' },
      sidestep: { id: 'sidestep', name: '反復横とび', unit: '回', step: 1, max: 80, min: 0, better: 'high', icon: '↔️' },
      shuttle: { id: 'shuttle', name: '20mシャトル', unit: '回', step: 1, max: 120, min: 0, better: 'high', icon: '🏃‍♀️' },
      dash50: { id: 'dash50', name: '50m走', unit: '秒', step: 0.1, max: 16, min: 5, better: 'low', icon: '⏱️' },
      jump: { id: 'jump', name: '立ち幅とび', unit: 'cm', step: 1, max: 250, min: 30, better: 'high', icon: '🐸' },
      throw: { id: 'throw', name: 'ソフトボール投', unit: 'm', step: 1, max: 60, min: 0, better: 'high', icon: '⚾' }
    };

    const GRADE_STATS = {
      1: { mean: 25, sd: 8 }, 2: { mean: 32, sd: 8 }, 3: { mean: 40, sd: 8 },
      4: { mean: 48, sd: 9 }, 5: { mean: 55, sd: 9 }, 6: { mean: 60, sd: 9 }
    };

    const DEFAULT_ICONS = ['👦', '👧', '🧑', '🐱', '🐶', '🦁', '🐰', '🐻', '🐼', '🐸'];
    
    const RARE_ICONS = [
      { id: '10pt', icon: '👑', name: '王冠', desc: 'いずれかの種目で10点満点をとる！' },
      { id: 'all', icon: '🌟', name: 'スター', desc: '1回のテストで全8種目を計測完了する！' },
      { id: 'a_rank', icon: '🐉', name: 'ドラゴン', desc: '暫定評価でA判定を獲得する！' },
      { id: 'best', icon: '🔥', name: '炎', desc: '過去の自分を超えろ！合計点をアップさせる！' },
      { id: 'speed', icon: '⚡', name: 'イナズマ', desc: '50m走で8点以上をとる！' }
    ];

    // --- Utility Functions ---
    const calcScore = (val, gender, grade, eventId) => {
      if (val === undefined || val === null || val === '') return 0;
      const gradeIdx = Math.max(0, Math.min(5, grade - 1));
      const thresholds = SCORE_THRESHOLDS[gender]?.[eventId]?.[gradeIdx];
      if (!thresholds) return 1;

      if (EVENT_MASTERS[eventId].better === 'low') {
        for (let i = 0; i < 9; i++) if (val <= thresholds[i]) return 10 - i;
      } else {
        for (let i = 0; i < 9; i++) if (val >= thresholds[i]) return 10 - i;
      }
      return 1;
    };

    const getGradeInfo = (totalScore, gender, grade) => {
      const gradeIdx = Math.max(0, Math.min(5, grade - 1));
      const borders = GRADE_THRESHOLDS[gender][gradeIdx];
      if (totalScore >= borders[0]) return { grade: 'A', nextPoint: null, nextName: null };
      if (totalScore >= borders[1]) return { grade: 'B', nextPoint: borders[0] - totalScore, nextName: 'A' };
      if (totalScore >= borders[2]) return { grade: 'C', nextPoint: borders[1] - totalScore, nextName: 'B' };
      if (totalScore >= borders[3]) return { grade: 'D', nextPoint: borders[2] - totalScore, nextName: 'C' };
      return { grade: 'E', nextPoint: borders[3] - totalScore, nextName: 'D' };
    };

    const getTitleInfo = (estimatedScore, grade, measuredCount) => {
      if (measuredCount === 0) return { name: 'まだ見ぬ強者', color: 'bg-gray-400 text-white', iconName: 'star', hell: '測りもせずに何を見ている！' };
      
      const stats = GRADE_STATS[Math.max(1, Math.min(6, grade))];
      const dev = Math.round(((estimatedScore - stats.mean) / stats.sd) * 10 + 50);

      if (dev >= 70) return { name: 'もはや鬼', color: 'bg-gradient-to-r from-purple-600 to-indigo-800 text-white shadow-purple-500/50', iconName: 'skull', hell: 'ふん、上出来だ。だがまだ鬼舞辻様には遠く及ばぬ。' }; 
      if (dev >= 63) return { name: '最強小学生', color: 'bg-gradient-to-r from-yellow-300 via-yellow-500 to-yellow-600 text-black border-2 border-yellow-200', iconName: 'trophy', hell: 'まあ見れる数字だな。だが驕るな、足元をすくわれるぞ！' }; 
      if (dev >= 60) return { name: 'ゲキツヨ', color: 'bg-red-500 text-white', iconName: 'flame', hell: 'こんな数字で満足しているのか？閻魔の炎で焼き尽くすぞ！' }; 
      if (dev >= 56) return { name: 'ツヨメ', color: 'bg-orange-500 text-white', iconName: 'zap', hell: '中途半端な奴が一番嫌いなんだ。死ぬ気で走れ！' }; 
      if (dev >= 52) return { name: '努力賞', color: 'bg-blue-500 text-white', iconName: 'award', hell: '努力だけじゃ人は救えん！結果を出せ、結果を！' }; 
      if (dev >= 47) return { name: 'マーマー', color: 'bg-green-500 text-white', iconName: 'activity', hell: '判断が遅い！そんな緩みきった肉体でどうする！' }; 
      return { name: '閻魔様激怒', color: 'bg-gray-800 text-red-500 font-serif border-2 border-red-800', iconName: 'shield-alert', hell: '貴様には才能がない！今すぐ針の山を走ってこい！！！' }; 
    };

    const getStyle = (gradeChar) => {
      switch (gradeChar) {
        case 'A': return { text: 'text-transparent bg-clip-text bg-gradient-to-br from-yellow-400 to-orange-600', bg: 'bg-gradient-to-r from-yellow-300 via-yellow-500 to-yellow-600 text-white shadow-yellow-500/50' };
        case 'B': return { text: 'text-blue-500', bg: 'bg-blue-500 text-white' };
        case 'C': return { text: 'text-green-500', bg: 'bg-green-500 text-white' };
        case 'D': return { text: 'text-orange-400', bg: 'bg-orange-400 text-white' };
        default: return { text: 'text-gray-400', bg: 'bg-gray-400 text-white' };
      }
    };

    // --- Main App Component ---
    function App() {
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState('');
      const [childrenData, setChildrenData] = useState([]);
      const [records, setRecords] = useState([]);
      
      const [currentChildId, setCurrentChildId] = useState(null);
      const [currentTab, setCurrentTab] = useState('home');
      const [isHellMode, setIsHellMode] = useState(false);
      const [rivalId, setRivalId] = useState('');

      const [editingRecordId, setEditingRecordId] = useState(null);
      const [inputData, setInputData] = useState({});
      const [inputDate, setInputDate] = useState('');
      const [inputGrade, setInputGrade] = useState(1);
      const [inputComment, setInputComment] = useState('');
      const [showIconModal, setShowIconModal] = useState(false);

      const [aiReview, setAiReview] = useState('');
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [showAiModal, setShowAiModal] = useState(false);

      useEffect(() => {
        let isMounted = true;
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } catch (e) { if(isMounted) setAuthError(`接続エラー: ${e.message}`); }
        };
        initAuth();
        const unsubscribe = auth.onAuthStateChanged(currentUser => {
          if (!isMounted) return;
          if (currentUser) { setUser(currentUser); setAuthError(''); }
        });
        return () => { isMounted = false; unsubscribe && unsubscribe(); };
      }, []);

      useEffect(() => {
        if (!user) return;
        const basePath = db.collection('artifacts').doc(SHARED_APP_ID).collection('public').doc('data');
        const unsubChildren = basePath.collection('children').onSnapshot(snap => {
          const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setChildrenData(data);
          setAuthError('');
          if (data.length > 0 && !currentChildId) setCurrentChildId(data[0].id);
        }, err => setAuthError(`Firebaseのルール設定を「完全共有」に書き換えてください。\n${err.message}`));
        const unsubRecords = basePath.collection('records').onSnapshot(snap => {
          setRecords(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });
        return () => { unsubChildren(); unsubRecords(); };
      }, [user, currentChildId]);

      const currentChild = childrenData.find(c => c.id === currentChildId);
      const rivalChild = childrenData.find(c => c.id === rivalId);
      
      const analyzeRecord = (record, child) => {
        if (!record || !child) return null;
        let actualScore = 0;
        let measuredCount = 0;
        const details = [];

        Object.keys(EVENT_MASTERS).forEach(eventId => {
          const val = record.data[eventId];
          const isMeasured = val !== undefined && val !== null;
          let score = 0;
          if (isMeasured) {
            score = calcScore(val, child.gender, record.grade, eventId);
            actualScore += score;
            measuredCount++;
          }
          details.push({ ...EVENT_MASTERS[eventId], val, score, isMeasured });
        });

        // 暫定評価のための80点満点換算スコア
        const estimatedScore = measuredCount > 0 ? Math.round((actualScore / measuredCount) * 8) : 0;
        const gradeInfo = getGradeInfo(estimatedScore, child.gender, record.grade);
        const titleInfo = getTitleInfo(estimatedScore, record.grade, measuredCount);

        return { ...record, actualScore, estimatedScore, measuredCount, details, compGrade: gradeInfo.grade, gradeInfo, titleInfo };
      };

      const userRecords = useMemo(() => records.filter(r => r.childId === currentChildId).sort((a, b) => new Date(b.date) - new Date(a.date)), [records, currentChildId]);
      const latestAnalyzed = analyzeRecord(userRecords[0], currentChild);
      const rivalRecords = useMemo(() => records.filter(r => r.childId === rivalId).sort((a, b) => new Date(b.date) - new Date(a.date)), [records, rivalId]);
      const rivalLatestAnalyzed = analyzeRecord(rivalRecords[0], rivalChild);

      // --- ご褒美・実績システム ---
      const achievements = useMemo(() => {
        if (!currentChild) return [];
        const unlocks = [];
        const analyzedList = userRecords.map(r => analyzeRecord(r, currentChild));
        
        // 10点満点
        if (analyzedList.some(r => r.details.some(d => d.score === 10))) unlocks.push('10pt');
        // 全種目完了
        if (analyzedList.some(r => r.measuredCount === 8)) unlocks.push('all');
        // A判定
        if (analyzedList.some(r => r.compGrade === 'A')) unlocks.push('a_rank');
        // 自己ベスト (2つ以上の記録があり、最新がその前より高い)
        if (analyzedList.length >= 2 && analyzedList[0].estimatedScore > analyzedList[1].estimatedScore) unlocks.push('best');
        // 50m走で8点以上
        if (analyzedList.some(r => r.details.find(d => d.id === 'dash50')?.score >= 8)) unlocks.push('speed');
        
        return unlocks;
      }, [userRecords, currentChild]);


      // Actions
      const handleSaveRecord = async () => {
        if (!user) return alert("接続エラーです");
        if (!currentChildId) return alert("選手を選択してください。");
        
        const recordId = editingRecordId || Date.now().toString();
        const newRecord = { id: recordId, childId: currentChildId, date: inputDate, grade: parseInt(inputGrade), data: { ...inputData }, comment: inputComment };
        try {
          const basePath = db.collection('artifacts').doc(SHARED_APP_ID).collection('public').doc('data');
          await basePath.collection('records').doc(recordId).set(newRecord);
          setCurrentTab('history');
        } catch (e) { alert(`保存エラー: ${e.message}`); }
      };

      const handleDeleteRecord = async () => {
        if (!user || !editingRecordId) return;
        if (window.confirm('本当にこの記録を削除しますか？')) {
          try {
            const basePath = db.collection('artifacts').doc(SHARED_APP_ID).collection('public').doc('data');
            await basePath.collection('records').doc(editingRecordId).delete();
            setCurrentTab('history');
          } catch (e) { alert('削除に失敗しました'); }
        }
      };

      const handleAddChild = async (e) => {
        e.preventDefault();
        if (!user) return alert("接続エラーです");
        const fd = new FormData(e.target);
        if(!fd.get('name')) return;
        
        const newId = Date.now().toString();
        const newChild = { id: newId, name: fd.get('name'), defaultGrade: parseInt(fd.get('grade')), gender: fd.get('gender'), avatar: '👦' };
        try {
          const basePath = db.collection('artifacts').doc(SHARED_APP_ID).collection('public').doc('data');
          await basePath.collection('children').doc(newId).set(newChild);
          setCurrentChildId(newId);
          setCurrentTab('home');
          e.target.reset();
        } catch (e) { alert(`選手追加エラー: ${e.message}`); }
      };

      const changeAvatar = async (newAvatar) => {
        if (!user || !currentChildId) return;
        try {
          const basePath = db.collection('artifacts').doc(SHARED_APP_ID).collection('public').doc('data');
          await basePath.collection('children').doc(currentChildId).update({ avatar: newAvatar });
          setShowIconModal(false);
        } catch (e) { alert('アイコン変更に失敗しました'); }
      };

      const startEditing = (recordToEdit = null) => {
        if (recordToEdit) {
          setEditingRecordId(recordToEdit.id);
          setInputData({ ...recordToEdit.data });
          setInputDate(recordToEdit.date);
          setInputGrade(recordToEdit.grade);
          setInputComment(recordToEdit.comment || '');
        } else {
          setEditingRecordId(null);
          setInputData({});
          setInputDate(new Date().toISOString().split('T')[0]);
          setInputGrade(currentChild?.defaultGrade || 1);
          setInputComment('');
        }
        setCurrentTab('input');
      };

          <div className={`fixed bottom-0 left-0 right-0 border-t flex justify-around p-2 pb-safe max-w-md mx-auto z-20 ${isHellMode ? 'bg-black border-red-900' : 'bg-white border-gray-200'}`}>
            <button onClick={() => setCurrentTab('home')} className={`flex flex-col items-center p-2 w-16 rounded-xl transition-colors ${currentTab === 'home' ? (isHellMode?'text-red-500 bg-red-950':'text-orange-500 bg-orange-50') : 'opacity-40'}`}><Icon name="bar-chart-3" size={24} /><span className="text-[10px] font-bold mt-1">ホーム</span></button>
            <button onClick={() => setCurrentTab('history')} className={`flex flex-col items-center p-2 w-16 rounded-xl transition-colors ${currentTab === 'history' ? (isHellMode?'text-red-500 bg-red-950':'text-orange-500 bg-orange-50') : 'opacity-40'}`}><Icon name="history" size={24} /><span className="text-[10px] font-bold mt-1">りれき</span></button>
            <button onClick={() => startEditing()} className={`flex flex-col items-center p-2 w-16 rounded-xl transition-colors relative -top-4 border-4 shadow-lg ${currentTab === 'input' ? (isHellMode?'text-black bg-red-800 border-red-950':'text-white bg-orange-500 border-orange-200') : (isHellMode?'text-red-700 bg-black border-black':'text-orange-500 bg-white border-white')}`}><Icon name="edit-3" size={28} /><span className="text-[10px] font-bold mt-1">きろく</span></button>
            <button onClick={() => setCurrentTab('settings')} className={`flex flex-col items-center p-2 w-16 rounded-xl transition-colors ${currentTab === 'settings' ? (isHellMode?'text-red-500 bg-red-950':'text-orange-500 bg-orange-50') : 'opacity-40'}`}><Icon name="settings" size={24} /><span className="text-[10px] font-bold mt-1">かんり</span></button>
          </div>

          {/* 地獄モードボタン */}
          <button onClick={() => setIsHellMode(!isHellMode)} className={`fixed top-20 right-2 p-2 rounded-full shadow-lg z-30 transition-colors border ${isHellMode ? 'bg-red-600 text-white border-red-400 animate-pulse' : 'bg-gray-800 text-gray-400 border-gray-600 opacity-50 hover:opacity-100'}`}>
            <Icon name="skull" size={16} />
          </button>

          {/* アイコン選択モーダル */}
          {showIconModal && currentChild && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center p-4 backdrop-blur-sm animate-fade-in pb-safe">
              <div className={`w-full max-w-sm rounded-3xl p-6 shadow-2xl border ${isHellMode ? 'bg-black border-red-800 text-red-500' : 'bg-white border-orange-200 text-gray-800'}`}>
                <div className="flex justify-between items-center mb-4 border-b pb-2">
                  <h3 className="font-bold text-lg">アイコンをえらぶ</h3>
                  <button onClick={() => setShowIconModal(false)} className="opacity-50 p-2"><Icon name="x" size={20}/></button>
                </div>
                
                <p className="text-xs opacity-70 mb-2 font-bold">基本のアイコン</p>
                <div className="grid grid-cols-5 gap-3 mb-6">
                  {DEFAULT_ICONS.map(i => (
                    <button key={i} onClick={() => changeAvatar(i)} className={`text-3xl p-2 rounded-xl border ${currentChild.avatar === i ? 'border-orange-500 bg-orange-50' : 'border-gray-100 bg-gray-50'}`}>{i}</button>
                  ))}
                </div>

                <p className="text-xs opacity-70 mb-2 font-bold flex items-center gap-1"><Icon name="lock" size={12}/> ご褒美レアアイコン（条件クリアで解放！）</p>
                <div className="grid grid-cols-4 gap-3">
                  {RARE_ICONS.map(r => {
                    const isUnlocked = achievements.includes(r.id);
                    return (
                      <button 
                        key={r.id} 
                        onClick={() => isUnlocked ? changeAvatar(r.icon) : alert(`${r.name} の解放条件：\n${r.desc}`)} 
                        className={`text-3xl p-2 rounded-xl border relative ${isUnlocked ? (currentChild.avatar === r.icon ? 'border-orange-500 bg-orange-50' : 'border-yellow-200 bg-yellow-50') : 'border-gray-100 bg-gray-100 grayscale opacity-40'}`}
                      >
                        {r.icon}
                        {!isUnlocked && <Icon name="lock" size={16} className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-gray-800 opacity-50"/>}
                      </button>
                    )
                  })}
                </div>
              </div>
            </div>
          )}

          {/* AI Review Modal */}
          {showAiModal && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
              <div className={`w-full max-w-sm rounded-3xl p-6 relative overflow-hidden shadow-2xl border ${isHellMode ? 'bg-black border-red-800 text-red-500' : 'bg-white border-orange-200 text-gray-800'}`}>
                <button onClick={() => setShowAiModal(false)} className="absolute top-4 right-4 opacity-50 p-1">✕</button>
                <div className="relative z-10 flex flex-col items-center text-center">
                  <div className={`w-20 h-20 rounded-full flex items-center justify-center text-4xl shadow-lg border-4 mb-4 -mt-12 ${isHellMode ? 'bg-red-950 border-red-800 text-red-500' : 'bg-gradient-to-br from-orange-400 to-red-500 border-white'}`}>
                    {isHellMode ? <Icon name="skull" size={40}/> : '🔥'}
                  </div>
                  <h3 className={`text-xl font-extrabold mb-2 ${isHellMode ? 'text-red-600 font-serif' : ''}`}>{isHellMode ? '地獄の説教部屋' : '熱血コーチ'}</h3>
                  
                  <div className={`w-full rounded-2xl p-5 mt-2 border min-h-[120px] flex items-center justify-center relative ${isHellMode ? 'bg-red-950/30 border-red-900' : 'bg-gray-50 border-gray-100'}`}>
                    {isAiLoading ? (
                      <div className="flex flex-col items-center font-bold animate-pulse"><Icon name="zap" size={24} className="mb-2" />{isHellMode ? '分析中だ...' : '分析中だぜ...！！'}</div>
                    ) : (
                      <p className={`font-medium leading-relaxed text-left whitespace-pre-wrap ${isHellMode ? 'font-serif text-lg tracking-widest' : ''}`}>{aiReview}</p>
                    )}
                  </div>
                  <button onClick={() => setShowAiModal(false)} className={`mt-6 font-bold py-3 px-8 rounded-full shadow-md w-full ${isHellMode ? 'bg-red-800 text-black' : 'bg-gray-800 text-white'}`}>
                    {isHellMode ? 'は、はいぃぃっ！！' : 'よし、がんばるぞ！'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
